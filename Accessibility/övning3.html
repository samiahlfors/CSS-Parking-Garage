<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>SmartParking Live</title>
    <meta name="description" content="SmartParking Live är digital live-karta där du dygnet runt kan se tillgängliga parkeringsplatser.">
    <link rel="stylesheet" href="övning3.css">
</head>
<body>
    <header>
        <div class="logo">SmartParking Live</div>
        <nav>
            <a href="#karta">Karta</a>
            <a href="#info">Info</a>
        </nav>
    </header>
    <main>
        <div class="garage-container">
            <h1>Live-vy: Garageplan A</h1>
            <p>Klicka på en ruta för att se detaljer.</p>
            
            <section class="floor-layout">
                <button class="spot" aria-label="Parkeringsruta 1: Upptagen">
                    <span aria-hidden="true">🚗</span>
                </button>
                <button class="spot" aria-label="Parkeringsruta 2: Upptagen">
                    <span aria-hidden="true">🚗</span>
                </button>
                <button class="spot" aria-label="Parkeringsruta 3: Ledig"></button>
                <button class="spot" aria-label="Parkeringsruta 4: Upptagen">
                    <span aria-hidden="true">🚗</span>
                </button>
            </section>
        </div>

        <section class="info-sidebar">
            <h1>Priser och Regler</h1>
            <p>Standardtaxa: 20kr/h. Orangea streckade linjer visar zongränsen.</p>
        </section>
    </main>
    <footer>
        <p>© 2026 SmartParking AB</p>
    </footer>

</body>
</html>
